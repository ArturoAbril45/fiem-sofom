<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e3a7a"/>
      <stop offset="100%" stop-color="#0a2d5e"/>
    </linearGradient>
  </defs>
  <!-- Fondo cuadrado redondeado -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Letra F serif -->
  <text x="32" y="44"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="42"
        font-weight="700"
        fill="#ffffff"
        text-anchor="middle">F</text>
  <!-- Línea dorada -->
  <line x1="16" y1="52" x2="48" y2="52" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
</svg>
