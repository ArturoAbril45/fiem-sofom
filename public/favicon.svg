<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Sombra del escudo -->
  <filter id="shadow">
    <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000033"/>
  </filter>
  <!-- Escudo -->
  <path d="M32 4 L56 14 L56 34 C56 48 44 58 32 62 C20 58 8 48 8 34 L8 14 Z"
        fill="#0a2d5e" filter="url(#shadow)"/>
  <!-- Borde interior del escudo -->
  <path d="M32 9 L51 17.5 L51 34 C51 45.5 42 54 32 57.5 C22 54 13 45.5 13 34 L13 17.5 Z"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Línea dorada decorativa -->
  <path d="M32 9 L51 17.5 L51 34 C51 45.5 42 54 32 57.5 C22 54 13 45.5 13 34 L13 17.5 Z"
        fill="url(#shimmer)" opacity="0.08"/>
  <defs>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#0a2d5e"/>
    </linearGradient>
  </defs>
  <!-- Iniciales FS -->
  <text x="32" y="38"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22"
        font-weight="700"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="-1">FS</text>
  <!-- Línea dorada debajo de las letras -->
  <line x1="22" y1="42" x2="42" y2="42" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
</svg>
